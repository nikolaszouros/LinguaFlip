{% extends "base.html" %}
{% block title %}Edit Deck - LinguaFlip{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Deck</h1>
    <a href="{{ url_for('decks.detail', deck_id=deck.id) }}" class="btn btn--secondary">Back to Deck</a>
</div>

<div class="form-container">
    <form method="post" class="form">
        <div class="form-group">
            <label for="name" class="form-label">Deck Name</label>
            <input
                type="text"
                id="name"
                name="name"
                class="form-input"
                value="{{ deck.name }}"
                required
                autofocus
            >
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Save Changes</button>
            <a href="{{ url_for('decks.detail', deck_id=deck.id) }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
