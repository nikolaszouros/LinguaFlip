{% extends "base.html" %}
{% block title %}Edit Card - LinguaFlip{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Card</h1>
    <a href="{{ url_for('decks.detail', deck_id=deck.id) }}" class="btn btn--secondary">Back to Deck</a>
</div>

<div class="form-container">
    <form method="post" class="form">
        <div class="form-row">
            <div class="form-group">
                <label for="front" class="form-label">Front (source)</label>
                <textarea
                    id="front"
                    name="front"
                    class="form-input form-textarea"
                    required
                    autofocus
                >{{ card.front }}</textarea>
            </div>
            <div class="form-group">
                <label for="back" class="form-label">Back (translation)</label>
                <textarea
                    id="back"
                    name="back"
                    class="form-input form-textarea"
                    required
                >{{ card.back }}</textarea>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Save Changes</button>
            <a href="{{ url_for('decks.detail', deck_id=deck.id) }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
